<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Chúc Mừng 2</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e2ea74, #f3ec20, #eef355);
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        
        .card-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            object-fit: contain;
            z-index: 10;
        }

        /* --- Cấu hình họa tiết động --- */
        .twinkle-star {
            position: absolute;
            animation: twinkle 3s ease-in-out infinite;
            z-index: 1;
            user-select: none;
        }

        /* Vị trí, thời gian sáng, và kích thước ngẫu nhiên cho 18 ngôi sao */
        .twinkle-star:nth-child(1) { top: 5%; left: 10%; animation-duration: 2s; animation-delay: 0s; font-size: 25px;}
        .twinkle-star:nth-child(2) { top: 15%; left: 85%; animation-duration: 3s; animation-delay: 0.5s; font-size: 15px;}
        .twinkle-star:nth-child(3) { top: 25%; left: 20%; animation-duration: 2.5s; animation-delay: 1.2s; font-size: 30px;}
        .twinkle-star:nth-child(4) { top: 35%; left: 75%; animation-duration: 4s; animation-delay: 0.8s; font-size: 20px;}
        .twinkle-star:nth-child(5) { top: 45%; left: 5%; animation-duration: 3.5s; animation-delay: 2.5s; font-size: 28px;}
        .twinkle-star:nth-child(6) { top: 55%; left: 90%; animation-duration: 2.8s; animation-delay: 1.5s; font-size: 18px;}
        .twinkle-star:nth-child(7) { top: 65%; left: 15%; animation-duration: 3.2s; animation-delay: 0.3s; font-size: 22px;}
        .twinkle-star:nth-child(8) { top: 75%; left: 80%; animation-duration: 2.2s; animation-delay: 2.1s; font-size: 26px;}
        .twinkle-star:nth-child(9) { top: 85%; left: 25%; animation-duration: 3.8s; animation-delay: 0.9s; font-size: 16px;}
        .twinkle-star:nth-child(10) { top: 90%; left: 70%; animation-duration: 2.6s; animation-delay: 1.8s; font-size: 32px;}
        .twinkle-star:nth-child(11) { top: 10%; left: 40%; animation-duration: 3.1s; animation-delay: 0.4s; font-size: 24px;}
        .twinkle-star:nth-child(12) { top: 80%; left: 45%; animation-duration: 2.4s; animation-delay: 1.6s; font-size: 19px;}
        .twinkle-star:nth-child(13) { top: 5%; left: 60%; animation-duration: 3.7s; animation-delay: 2.2s; font-size: 21px;}
        .twinkle-star:nth-child(14) { top: 95%; left: 50%; animation-duration: 2.9s; animation-delay: 0.7s; font-size: 27px;}
        .twinkle-star:nth-child(15) { top: 50%; left: 10%; animation-duration: 3.3s; animation-delay: 1.1s; font-size: 23px;}
        .twinkle-star:nth-child(16) { top: 50%; left: 85%; animation-duration: 2.7s; animation-delay: 0.2s; font-size: 29px;}
        .twinkle-star:nth-child(17) { top: 20%; left: 50%; animation-duration: 3.6s; animation-delay: 1.9s; font-size: 17px;}
        .twinkle-star:nth-child(18) { top: 70%; left: 60%; animation-duration: 2.3s; animation-delay: 1.4s; font-size: 25px;}

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.2; 
                transform: scale(0.8); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.3); 
                text-shadow: 0 0 10px #fff, 0 0 20px #fff; /* Hiệu ứng tỏa sáng ở giữa nhịp */
            }
        }
    </style>
</head>
<body>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">💫</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">💫</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">💫</div>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">🌟</div>
    <div class="twinkle-star">💫</div>
    <div class="twinkle-star">✨</div>
    <div class="twinkle-star">🌟</div>

    <img class="card-img" src="Thiệp SN (1).png" alt="Thiệp chúc mừng 2">
</body>
</html>
