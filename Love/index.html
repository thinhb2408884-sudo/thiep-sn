<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Chúc Mừng 1</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #fce4ec);
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        
        .card-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            object-fit: contain;
            z-index: 10;
        }

        /* --- Cấu hình họa tiết động --- */
        .floating-item {
            position: absolute;
            bottom: -15%;
            animation: floatUp 8s ease-in-out infinite;
            z-index: 1;
            opacity: 0.8;
            user-select: none; /* Không cho copy icon */
        }

        /* Tọa độ, tốc độ, độ trễ và kích thước cho 15 icon khác nhau */
        .floating-item:nth-child(1) { left: 5%; animation-duration: 7s; animation-delay: 0s; font-size: 30px; }
        .floating-item:nth-child(2) { left: 15%; animation-duration: 10s; animation-delay: 2s; font-size: 20px; }
        .floating-item:nth-child(3) { left: 25%; animation-duration: 8s; animation-delay: 1s; font-size: 35px; }
        .floating-item:nth-child(4) { left: 35%; animation-duration: 12s; animation-delay: 0.5s; font-size: 18px; }
        .floating-item:nth-child(5) { left: 45%; animation-duration: 9s; animation-delay: 3s; font-size: 28px; }
        .floating-item:nth-child(6) { left: 55%; animation-duration: 11s; animation-delay: 1.5s; font-size: 25px; }
        .floating-item:nth-child(7) { left: 65%; animation-duration: 8s; animation-delay: 4s; font-size: 32px; }
        .floating-item:nth-child(8) { left: 75%; animation-duration: 10s; animation-delay: 2.5s; font-size: 22px; }
        .floating-item:nth-child(9) { left: 85%; animation-duration: 7s; animation-delay: 0.8s; font-size: 30px; }
        .floating-item:nth-child(10) { left: 95%; animation-duration: 9s; animation-delay: 3.5s; font-size: 24px; }
        .floating-item:nth-child(11) { left: 10%; animation-duration: 11s; animation-delay: 5s; font-size: 26px; }
        .floating-item:nth-child(12) { left: 30%; animation-duration: 8s; animation-delay: 6s; font-size: 20px; }
        .floating-item:nth-child(13) { left: 50%; animation-duration: 10s; animation-delay: 4.5s; font-size: 29px; }
        .floating-item:nth-child(14) { left: 70%; animation-duration: 7.5s; animation-delay: 5.5s; font-size: 27px; }
        .floating-item:nth-child(15) { left: 90%; animation-duration: 9.5s; animation-delay: 6.5s; font-size: 21px; }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            33% { transform: translateY(-40vh) translateX(30px) rotate(120deg); opacity: 0.9;}
            66% { transform: translateY(-80vh) translateX(-20px) rotate(240deg); opacity: 0.7;}
            100% { transform: translateY(-120vh) translateX(10px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="floating-item">💖</div>
    <div class="floating-item">🌸</div>
    <div class="floating-item">✨</div>
    <div class="floating-item">🦋</div>
    <div class="floating-item">💖</div>
    <div class="floating-item">🎈</div>
    <div class="floating-item">🌸</div>
    <div class="floating-item">✨</div>
    <div class="floating-item">💖</div>
    <div class="floating-item">🦋</div>
    <div class="floating-item">🌸</div>
    <div class="floating-item">🎀</div>
    <div class="floating-item">💖</div>
    <div class="floating-item">✨</div>
    <div class="floating-item">🌸</div>

    <img class="card-img" src="Thiệp SN.png" alt="Thiệp chúc mừng 1">
</body>
</html>
